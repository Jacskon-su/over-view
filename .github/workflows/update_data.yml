# .github/workflows/update_data.yml
# GitHub Actions 每日自動更新台股歷史資料
# 每天 14:30（台灣時間 UTC+8 = UTC 06:30）執行

name: 📊 每日更新台股歷史資料

on:
  schedule:
    - cron: '13 7 * * 1-5'
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60 

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install yfinance pandas pyarrow shioaji requests huggingface_hub

      - name: 🔄 Run update_data.py
        env:
          SJ_API_KEY: ${{ secrets.SJ_API_KEY }}
          SJ_SECRET_KEY: ${{ secrets.SJ_SECRET_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_data.py
