# .github/workflows/update_data.yml
# GitHub Actions 每日自動更新台股歷史資料
# 每天 14:30（台灣時間 UTC+8 = UTC 06:30）執行

name: 📊 每日更新台股歷史資料

on:
  schedule:
    - cron: "30 6 * * 1-5"   # 週一到週五 UTC 06:30（台灣時間 14:30）
  workflow_dispatch:           # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. 取得 Repo 程式碼
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      # 2. 設定 Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安裝套件
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml beautifulsoup4
          pip install twstock
          pip install yfinance pandas pyarrow

      # 4. 執行更新腳本
      - name: 🔄 Run update_data.py
        run: python update_data.py

      # 5. 若有資料變動，自動 commit + push 回 Repo
      - name: 📤 Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "✅ 無資料變動，跳過 commit"
          else
            git commit -m "📊 自動更新歷史資料 $(date '+%Y-%m-%d')"
            git push
          fi
