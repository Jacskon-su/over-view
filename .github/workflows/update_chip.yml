- name: 🔍 Debug Secrets & Run
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "🚨 抓到兇手了！GitHub Secrets 傳出來的密碼是空的！請檢查設定頁面！"
          else
            echo "✅ 機器人有拿到密碼了，準備交給 Python！"
          fi
          python update_chip.py
